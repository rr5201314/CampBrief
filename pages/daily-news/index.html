<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>简豹每日资讯</title>
<link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body data-theme="x-light">
<svg width="0" height="0" aria-hidden="true" focusable="false" style="position:absolute">

  <symbol id="i-trophy" viewBox="0 0 24 24"><path d="M8 4h8v4a4 4 0 0 1-8 0z"/><path d="M8 6H5a3 3 0 0 0 3 5"/><path d="M16 6h3a3 3 0 0 1-3 5"/><path d="M12 12v5"/><path d="M8 20h8"/><path d="M9.5 17h5"/></symbol>
  <symbol id="i-exam" viewBox="0 0 24 24"><rect x="5" y="4" width="14" height="17" rx="2"/><path d="M9 4V3h6v1"/><path d="M9 11h6"/><path d="M9 15h4"/></symbol>
  <symbol id="i-code" viewBox="0 0 24 24"><path d="m8 8-4 4 4 4"/><path d="m16 8 4 4-4 4"/><path d="m14 5-4 14"/></symbol>
  <symbol id="i-news" viewBox="0 0 24 24"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 7h8"/><path d="M8 11h8"/><path d="M8 15h5"/></symbol>
  <symbol id="i-info" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 11v6"/><path d="M12 7h.01"/></symbol>
  <symbol id="i-github" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.58 2 12.26c0 4.5 2.87 8.32 6.84 9.67.5.1.68-.22.68-.5 0-.24 0-.87-.01-1.7-2.78.62-3.37-1.37-3.37-1.37-.45-1.18-1.11-1.5-1.11-1.5-.9-.64.07-.62.07-.62 1 .07 1.53 1.06 1.53 1.06.89 1.57 2.34 1.12 2.91.86.09-.67.35-1.12.63-1.38-2.22-.26-4.56-1.14-4.56-5.06 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.3.1-2.7 0 0 .84-.28 2.75 1.05a9.38 9.38 0 0 1 5 0c1.91-1.33 2.75-1.05 2.75-1.05.55 1.4.2 2.44.1 2.7.64.72 1.03 1.63 1.03 2.75 0 3.94-2.34 4.8-4.57 5.06.36.32.68.94.68 1.9 0 1.37-.01 2.48-.01 2.82 0 .27.18.6.69.5C19.14 20.57 22 16.75 22 12.26 22 6.58 17.52 2 12 2z"/></symbol>

  <symbol id="i-sports" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 12c2.5-2.5 5-4 7-2s1 5.5-1.5 7.5-6.5 2-8.5 0-3-5.5-1-7.5 4.5-.5 7 2z"/><path d="M12 12 7 7"/><path d="m12 12 5 5"/></symbol>
  <symbol id="i-category" viewBox="0 0 24 24"><path d="M4 5h7v7H4z"/><path d="M13 5h7v7h-7z"/><path d="M4 14h7v5H4z"/><path d="M13 14h7v5h-7z"/></symbol>
  <symbol id="i-status" viewBox="0 0 24 24"><path d="M9 12l2 2 4-5"/><circle cx="12" cy="12" r="9"/></symbol>
  <symbol id="i-search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></symbol>
  <symbol id="i-list" viewBox="0 0 24 24"><path d="M8 6h12"/><path d="M8 12h12"/><path d="M8 18h12"/><path d="M4 6h.01"/><path d="M4 12h.01"/><path d="M4 18h.01"/></symbol>
  <symbol id="i-calendar" viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="15" rx="3"/><path d="M8 3v4"/><path d="M16 3v4"/><path d="M4 10h16"/></symbol>
  <symbol id="i-medal" viewBox="0 0 24 24"><circle cx="12" cy="14" r="5"/><path d="M9 3h6l-1.5 6h-3z"/><path d="m9 3 3 6 3-6"/></symbol>
  <symbol id="i-arrow" viewBox="0 0 24 24"><path d="M5 12h14"/><path d="m13 6 6 6-6 6"/></symbol>
  <symbol id="i-doc" viewBox="0 0 24 24"><path d="M7 3h7l4 4v14H7z"/><path d="M14 3v5h5"/><path d="M9 13h6"/><path d="M9 17h6"/></symbol>
  <symbol id="i-grid" viewBox="0 0 24 24"><path d="M4 4h7v7H4z"/><path d="M13 4h7v7h-7z"/><path d="M4 13h7v7H4z"/><path d="M13 13h7v7h-7z"/></symbol>
  <symbol id="i-clock" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></symbol>

  <symbol id="i-chevron-right" viewBox="0 0 24 24"><path d="m9 6 6 6-6 6"/></symbol>
  <symbol id="i-chevron-down" viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></symbol>
  <symbol id="i-close" viewBox="0 0 24 24"><path d="m6 6 12 12"/><path d="m18 6-12 12"/></symbol>
  <symbol id="i-bulb" viewBox="0 0 24 24"><path d="M9 18h6"/><path d="M10 21h4"/><path d="M12 3a6 6 0 0 0-4 10.5c.6.6 1 1.4 1 2.5h6c0-1.1.4-1.9 1-2.5A6 6 0 0 0 12 3z"/></symbol>

<div class="page-shell">
  <main class="main-column">
    <header class="topbar">
      <a href="../../index.html" class="brand">
        <span class="brand-mark">C</span>
        <span>简豹</span>
      </a>
      <div class="top-actions">
        <nav class="nav" aria-label="主导航">
          <a href="../../index.html" class="nav-link"><svg class="icon-sm icon"><use href="#i-home"/></svg>首页</a>
          <a href="../../pages/competitions/index.html" class="nav-link"><svg class="icon-sm icon"><use href="#i-trophy"/></svg>竞赛</a>
          <a href="../../pages/exams/index.html" class="nav-link"><svg class="icon-sm icon"><use href="#i-exam"/></svg>考试</a>
          <a href="../../pages/tech/index.html" class="nav-link"><svg class="icon-sm icon"><use href="#i-code"/></svg>技术</a>
          <a href="../../pages/daily-news/index.html" class="nav-link active"><svg class="icon-sm icon"><use href="#i-news"/></svg>每日资讯</a>
          <a href="../../pages/about/index.html" class="nav-link"><svg class="icon-sm icon"><use href="#i-info"/></svg>关于</a>
        </nav>
        <button class="theme-toggle" id="themeToggle" type="button" aria-label="切换主题">
          <svg class="icon-sm icon"><use href="#i-status"/></svg>
          <span>浅色模式</span>
        </button>
      </div>
    </header>

    <div class="inner">
      <section class="title-row">
        <div>
          <div class="eyebrow"><svg class="icon-sm icon"><use href="#i-news"/></svg>每日资讯</div>
          <h1>每日资讯</h1>
          <p class="subtitle">为大学生精选竞赛动态、学习资源、技术更新和重要机会提醒。</p>
        </div>
        <div class="count-pill"><svg class="icon-sm icon"><use href="#i-list"/></svg><span id="resultCount">加载中...</span></div>
      </section>

      <!-- 头条资讯轮播 -->
      <section class="carousel" data-carousel hidden>
        <div class="carousel-header">
          <div class="carousel-title"><svg class="icon-sm icon"><use href="#i-trophy"/></svg>近7天头条</div>
          <span class="carousel-hint">滚轮滑动浏览</span>
        </div>
        <div class="carousel-viewport">
          <div class="carousel-track" data-carousel-track></div>
          <button class="carousel-nav prev" data-carousel-prev type="button" aria-label="向左滑动"><svg class="icon-sm icon"><use href="#i-chevron-left"/></svg></button>
          <button class="carousel-nav next" data-carousel-next type="button" aria-label="向右滑动"><svg class="icon-sm icon"><use href="#i-chevron-right"/></svg></button>
        </div>
      </section>

      <section class="filter-panel" aria-label="资讯筛选">
        <div class="filter-row">
          <div class="filter-label"><svg class="icon"><use href="#i-category"/></svg>资讯分类</div>
          <div class="filter-scroll" data-filter-scroll>
            <div class="options" data-filter-group="category">
              <button class="option active" data-value="all"><span class="option-dot"></span>全部</button>
              <button class="option" data-value="ai"><svg class="icon-sm icon"><use href="#i-bot"/></svg>AI 资讯</button>
              <button class="option" data-value="sports"><svg class="icon-sm icon"><use href="#i-sports"/></svg>体育</button>
              <button class="option" data-value="fun"><svg class="icon-sm icon"><use href="#i-bulb"/></svg>每日趣闻</button>
            </div>
          </div>
        </div>
        <div class="filter-row">
          <div class="filter-label"><svg class="icon"><use href="#i-calendar"/></svg>日期</div>
          <div class="filter-scroll" data-filter-scroll>
            <div class="options" data-filter-group="date" role="group" aria-label="资讯发布日期">
              <button class="option active" type="button" data-value="all" aria-pressed="true">全部</button>
              <button class="option" type="button" data-value="24h" aria-pressed="false">24小时</button>
              <button class="option" type="button" data-value="3d" aria-pressed="false">3天</button>
              <button class="option" type="button" data-value="7d" aria-pressed="false">7天</button>
              <button class="option" type="button" data-value="30d" aria-pressed="false">30天</button>
              <button class="option" type="button" data-value="custom" aria-pressed="false" aria-controls="dateModal" aria-expanded="false"><svg class="icon-sm icon"><use href="#i-calendar"/></svg>自定义日期</button>
            </div>
          </div>
        </div>
        <div class="search-wrap">
          <svg class="icon"><use href="#i-search"/></svg>
          <input id="searchInput" class="search-input" type="search" placeholder="请输入资讯标题或关键词搜索" autocomplete="off">
        </div>
      </section>

      <div class="content-toolbar">
        <span>为大学生精选的每日信息简报</span>
        <span class="sort-pill"><svg class="icon-sm icon"><use href="#i-calendar"/></svg>最近更新</span>
      </div>

      <section class="cards" id="cards">
        <!-- 动态加载的卡片将在这里渲染 -->
        <div class="loading-state" style="text-align: center; padding: 40px; color: var(--text-secondary, #666);">
          <p>正在加载资讯数据...</p>
        </div>
      </section>
      <p class="empty-state" id="emptyState" role="status" hidden>暂无符合条件的资讯，试试调整日期或关键词。</p>

      <nav class="pagination" aria-label="分页">
        <button class="page-btn"><svg class="icon-sm icon"><use href="#i-chevron-left"/></svg></button>
        <button class="page-btn active">1</button>
        <button class="page-btn">2</button>
        <button class="page-btn">3</button>
        <button class="page-btn"><svg class="icon-sm icon"><use href="#i-chevron-right"/></svg></button>
      </nav>
    </div>
  </main>
</div>

<div class="date-modal" id="dateModal" role="presentation" hidden>
  <div class="date-modal-backdrop" data-date-modal-close></div>
  <section class="date-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="dateModalTitle">
    <header class="date-modal-header">
      <div>
        <p class="date-modal-kicker">资讯日期</p>
        <h2 id="dateModalTitle">选择日期</h2>
      </div>
      <button class="calendar-close" id="dateModalClose" type="button" aria-label="关闭日期日历" data-date-modal-close>
        <svg class="icon"><use href="#i-close"/></svg>
      </button>
    </header>
    <div class="calendar-month-nav">
      <button class="calendar-nav" type="button" aria-label="上个月" data-calendar-nav="previous"><svg class="icon"><use href="#i-chevron-left"/></svg></button>
      <div class="calendar-period" aria-label="当前日历月份">
        <button class="calendar-period-trigger" id="calendarYearTrigger" type="button" data-calendar-year-menu-toggle aria-controls="calendarYearMenu" aria-haspopup="listbox" aria-expanded="false"><span id="calendarYearValue"></span><svg class="icon-sm icon"><use href="#i-chevron-down"/></svg></button>
        <button class="calendar-period-trigger" id="calendarMonthTrigger" type="button" data-calendar-month-menu-toggle aria-controls="calendarMonthMenu" aria-haspopup="listbox" aria-expanded="false"><span id="calendarMonthValue"></span><svg class="icon-sm icon"><use href="#i-chevron-down"/></svg></button>
        <div class="calendar-year-menu" id="calendarYearMenu" role="listbox" aria-label="选择年份" hidden></div>
        <div class="calendar-month-menu" id="calendarMonthMenu" role="listbox" aria-label="选择月份" hidden></div>
      </div>
      <button class="calendar-nav" type="button" aria-label="下个月" data-calendar-nav="next"><svg class="icon"><use href="#i-chevron-right"/></svg></button>
    </div>
    <div class="calendar-weekdays" aria-hidden="true"><span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span></div>
    <div class="calendar-grid" id="calendarGrid" aria-label="选择资讯发布日期"></div>
    <footer class="date-modal-actions">
      <button class="btn btn-secondary" id="clearDateButton" type="button">清除日期</button>
      <button class="btn btn-primary" type="button" data-date-modal-close>取消</button>
    </footer>
  </section>
</div>

<script src="../../assets/js/main.js"></script>
<script src="../../assets/js/carousel.js"></script>
<script src="../../assets/js/filter-scroll.js"></script>
<script src="../../assets/js/content-utils.js"></script>
<script src="../../assets/js/daily-news.js"></script>
</body>
</html>
