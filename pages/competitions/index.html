<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>简豹竞赛</title>
<link rel="stylesheet" href="../../assets/css/style.css">
</head>
<body data-theme="x-light">
<svg width="0" height="0" aria-hidden="true" focusable="false" style="position:absolute">
  <symbol id="i-home" viewBox="0 0 24 24"><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10.5V20h14v-9.5"/><path d="M10 20v-5h4v5"/></symbol>
  <symbol id="i-trophy" viewBox="0 0 24 24"><path d="M8 4h8v4a4 4 0 0 1-8 0z"/><path d="M8 6H5a3 3 0 0 0 3 5"/><path d="M16 6h3a3 3 0 0 1-3 5"/><path d="M12 12v5"/><path d="M8 20h8"/><path d="M9.5 17h5"/></symbol>
  <symbol id="i-exam" viewBox="0 0 24 24"><rect x="5" y="4" width="14" height="17" rx="2"/><path d="M9 4V3h6v1"/><path d="M9 11h6"/><path d="M9 15h4"/></symbol>
  <symbol id="i-code" viewBox="0 0 24 24"><path d="m8 8-4 4 4 4"/><path d="m16 8 4 4-4 4"/><path d="m14 5-4 14"/></symbol>
  <symbol id="i-bot" viewBox="0 0 24 24"><rect x="5" y="8" width="14" height="11" rx="4"/><path d="M12 8V4"/><path d="M9 13h.01"/><path d="M15 13h.01"/><path d="M9.5 17h5"/></symbol>
  <symbol id="i-info" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 11v6"/><path d="M12 7h.01"/></symbol>
  <symbol id="i-category" viewBox="0 0 24 24"><path d="M4 5h7v7H4z"/><path d="M13 5h7v7h-7z"/><path d="M4 14h7v5H4z"/><path d="M13 14h7v5h-7z"/></symbol>
  <symbol id="i-status" viewBox="0 0 24 24"><path d="M9 12l2 2 4-5"/><circle cx="12" cy="12" r="9"/></symbol>
  <symbol id="i-search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></symbol>
  <symbol id="i-list" viewBox="0 0 24 24"><path d="M8 6h12"/><path d="M8 12h12"/><path d="M8 18h12"/><path d="M4 6h.01"/><path d="M4 12h.01"/><path d="M4 18h.01"/></symbol>
  <symbol id="i-calendar" viewBox="0 0 24 24"><rect x="4" y="5" width="16" height="15" rx="3"/><path d="M8 3v4"/><path d="M16 3v4"/><path d="M4 10h16"/></symbol>
  <symbol id="i-medal" viewBox="0 0 24 24"><circle cx="12" cy="14" r="5"/><path d="M9 3h6l-1.5 6h-3z"/><path d="m9 3 3 6 3-6"/></symbol>
  <symbol id="i-arrow" viewBox="0 0 24 24"><path d="M5 12h14"/><path d="m13 6 6 6-6 6"/></symbol>
  <symbol id="i-doc" viewBox="0 0 24 24"><path d="M7 3h7l4 4v14H7z"/><path d="M14 3v5h5"/><path d="M9 13h6"/><path d="M9 17h6"/></symbol>
  <symbol id="i-grid" viewBox="0 0 24 24"><path d="M4 4h7v7H4z"/><path d="M13 4h7v7h-7z"/><path d="M4 13h7v7H4z"/><path d="M13 13h7v7h-7z"/></symbol>
  <symbol id="i-clock" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></symbol>
  <symbol id="i-unlock" viewBox="0 0 24 24"><rect x="5" y="10" width="14" height="10" rx="3"/><path d="M8 10V8a4 4 0 0 1 7.5-2"/></symbol>
  <symbol id="i-lock" viewBox="0 0 24 24"><rect x="5" y="10" width="14" height="10" rx="3"/><path d="M8 10V8a4 4 0 0 1 8 0v2"/></symbol>
  <symbol id="i-check" viewBox="0 0 24 24"><path d="m5 12 4 4L19 6"/></symbol>
  <symbol id="i-chevron-left" viewBox="0 0 24 24"><path d="m15 6-6 6 6 6"/></symbol>
  <symbol id="i-chevron-right" viewBox="0 0 24 24"><path d="m9 6 6 6-6 6"/></symbol>
</svg>

<div class="page-shell">
  <main class="main-column">
    <header class="topbar">
      <a href="../../index.html" class="brand">
        <span class="brand-mark">C</span>
        <span>简豹</span>
      </a>
      <div class="top-actions">
        <nav class="nav" aria-label="主导航">
          <a href="../../index.html" class="nav-link"><svg class="icon-sm icon"><use href="#i-home"/></svg>首页</a>
          <a href="../../pages/competitions/index.html" class="nav-link active"><svg class="icon-sm icon"><use href="#i-trophy"/></svg>竞赛</a>
          <a href="../../pages/exams/index.html" class="nav-link"><svg class="icon-sm icon"><use href="#i-exam"/></svg>考试</a>
          <a href="../../pages/tech/index.html" class="nav-link"><svg class="icon-sm icon"><use href="#i-code"/></svg>技术</a>
          <a href="../../pages/daily-news/index.html" class="nav-link"><svg class="icon-sm icon"><use href="#i-bot"/></svg>每日资讯</a>
          <a href="../../pages/about/index.html" class="nav-link"><svg class="icon-sm icon"><use href="#i-info"/></svg>关于</a>
        </nav>
        <button class="theme-toggle" id="themeToggle" type="button" aria-label="切换主题">
          <svg class="icon-sm icon"><use href="#i-status"/></svg>
          <span>浅色模式</span>
        </button>
      </div>
    </header>

    <div class="inner">
      <section class="title-row">
        <div>
          <div class="eyebrow"><svg class="icon-sm icon"><use href="#i-trophy"/></svg>竞赛专区</div>
          <h1>竞赛</h1>
          <p class="subtitle">发现校园挑战赛、创新项目和黑客马拉松。</p>
        </div>
        <div class="count-pill"><svg class="icon-sm icon"><use href="#i-list"/></svg><span id="resultCount">4 个进行中的赛事</span></div>
      </section>

      <!-- 精选竞赛轮播 -->
      <section class="carousel" data-carousel hidden>
        <div class="carousel-header">
          <div class="carousel-title"><svg class="icon-sm icon"><use href="#i-trophy"/></svg>精选竞赛</div>
          <span class="carousel-hint">滚轮滑动浏览</span>
        </div>
        <div class="carousel-viewport">
          <div class="carousel-track" data-carousel-track></div>
          <button class="carousel-nav prev" data-carousel-prev type="button" aria-label="向左滑动"><svg class="icon-sm icon"><use href="#i-chevron-left"/></svg></button>
          <button class="carousel-nav next" data-carousel-next type="button" aria-label="向右滑动"><svg class="icon-sm icon"><use href="#i-chevron-right"/></svg></button>
        </div>
      </section>

      <section class="filter-panel" aria-label="赛事筛选">
        <div class="filter-row">
          <div class="filter-label"><svg class="icon"><use href="#i-medal"/></svg>赛事层次</div>
          <div class="options" data-filter-group="tier" role="group" aria-label="赛事层次">
            <button class="option active" type="button" data-value="all" aria-pressed="true"><span class="option-dot"></span>全部</button>
            <button class="option" type="button" data-value="official" aria-pressed="false"><svg class="icon-sm icon"><use href="#i-check"/></svg>教育部认可赛事</button>
            <button class="option" type="button" data-value="enterprise" aria-pressed="false"><svg class="icon-sm icon"><use href="#i-trophy"/></svg>名企主办赛事</button>
            <button class="option" type="button" data-value="hobby" aria-pressed="false"><svg class="icon-sm icon"><use href="#i-info"/></svg>兴趣练手赛事</button>
          </div>
        </div>
        <div class="filter-row">
          <div class="filter-label"><svg class="icon"><use href="#i-category"/></svg>专业领域</div>
          <div class="options" data-filter-group="field" role="group" aria-label="专业领域">
            <button class="option active" type="button" data-value="all" aria-pressed="true"><span class="option-dot"></span>全部</button>
            <button class="option" data-value="innovation"><span class="option-dot"></span>创新创业</button>
            <button class="option" data-value="computer"><span class="option-dot"></span>计算机/信息技术</button>
            <button class="option" data-value="engineering"><span class="option-dot"></span>工程/机电</button>
            <button class="option" data-value="ai"><span class="option-dot"></span>人工智能</button>
            <button class="option" data-value="robot"><span class="option-dot"></span>机器人</button>
            <button class="option" data-value="science"><span class="option-dot"></span>数理/化学</button>
            <button class="option" data-value="design"><span class="option-dot"></span>设计/艺术</button>
            <button class="option" data-value="language"><span class="option-dot"></span>外语</button>
            <button class="option" data-value="business"><span class="option-dot"></span>商科/金融</button>
            <button class="option" data-value="medical"><span class="option-dot"></span>医学/生命科学</button>
            <button class="option" data-value="civil"><span class="option-dot"></span>建筑/土木</button>
            <button class="option" data-value="vocational"><span class="option-dot"></span>职业技能</button>
          </div>
        </div>
        <div class="filter-row">
          <div class="filter-label"><svg class="icon"><use href="#i-status"/></svg>比赛状态</div>
          <div class="options" data-filter-group="status" role="group" aria-label="赛事状态">
            <button class="option active" type="button" data-value="all" aria-pressed="true"><span class="option-dot"></span>全部</button>
            <button class="option" type="button" data-value="pending" aria-pressed="false"><svg class="icon-sm icon"><use href="#i-clock"/></svg>未开始</button>
            <button class="option" type="button" data-value="open" aria-pressed="false"><svg class="icon-sm icon"><use href="#i-unlock"/></svg>可报名</button>
            <button class="option" type="button" data-value="ongoing" aria-pressed="false"><svg class="icon-sm icon"><use href="#i-status"/></svg>比赛中</button>
            <button class="option" type="button" data-value="done" aria-pressed="false"><svg class="icon-sm icon"><use href="#i-check"/></svg>已完赛</button>
          </div>
        </div>
        <div class="search-wrap">
          <svg class="icon"><use href="#i-search"/></svg>
          <input id="searchInput" class="search-input" type="search" placeholder="请输入赛事名称、主办方或关键词搜索" autocomplete="off">
        </div>
      </section>

      <div class="content-toolbar">
        <span>为大学生精选的竞赛</span>
        <span class="sort-pill"><svg class="icon-sm icon"><use href="#i-calendar"/></svg>最近更新</span>
      </div>

      <section class="cards" id="cards">
        <!-- 卡片由 competitions.js 从 data/competitions.json 动态渲染 -->
      </section>

      <div class="empty-state" id="emptyState" role="status" hidden>
        <p>没有找到匹配的赛事，试试调整筛选条件或搜索关键词。</p>
      </div>

      <nav class="pagination" aria-label="赛事分页" hidden></nav>
    </div>
  </main>
</div>

<script src="../../assets/js/main.js"></script>
<script src="../../assets/js/carousel.js"></script>
<script src="../../assets/js/content-utils.js"></script>
<script src="../../assets/js/competitions.js"></script>
</body>
</html>
