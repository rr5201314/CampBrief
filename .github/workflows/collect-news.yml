# CampBrief 每日资讯采集
#
# 架构：GitHub Actions 负责云端定时采集候选池，Hermes（手机）负责 agent 编辑决策。
# - 08:10 北京时间：采集全部 RSS 源（排除 juya AI 日报，该源中午才更新）
# - 13:10 北京时间：只采集 juya AI 日报，合并到已有候选池
# - 采集完成后推送候选池到仓库，并发飞书通知
#
# Hermes 按自己的 cron 拉取最新仓库并执行对应 skill。
#
# 注意：cron 用 UTC 时间。北京时间 = UTC+8。
#   08:10 CST = 00:10 UTC；13:10 CST = 05:10 UTC
# 错开整点避开 GitHub Actions 高峰，降低 schedule 被延迟或跳过的概率

name: 采集每日资讯

on:
  schedule:
    # 每天北京时间 08:10（UTC 00:10）采集除 juya 外的全部源
    - cron: "10 0 * * *"
    # 每天北京时间 13:10（UTC 05:10）只采集 juya AI 日报，合并到候选池
    - cron: "10 5 * * *"
  # 支持手动触发，用于测试
  workflow_dispatch:
    inputs:
      batch:
        description: "采集批次（morning=排除juya / noon=只采juya / full=全量）"
        type: choice
        options: [morning, noon, full]
        default: full

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 判断批次
        id: batch
        run: |
          # 根据触发方式确定批次
          if [ "${{ github.event_name }}" = "schedule" ]; then
            # cron 触发：按 UTC 小时判断（08:10 CST=00 UTC, 13:10 CST=05 UTC）
            UTC_HOUR=$(date -u +%H)
            if [ "$UTC_HOUR" = "00" ]; then
              echo "batch=morning" >> $GITHUB_OUTPUT
            elif [ "$UTC_HOUR" = "05" ]; then
              echo "batch=noon" >> $GITHUB_OUTPUT
            else
              echo "batch=full" >> $GITHUB_OUTPUT
            fi
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "batch=${{ github.event.inputs.batch }}" >> $GITHUB_OUTPUT
          else
            echo "batch=full" >> $GITHUB_OUTPUT
          fi

      - name: 采集每日资讯候选池
        run: |
          BATCH="${{ steps.batch.outputs.batch }}"
          echo "=== 采集批次: $BATCH ==="

          if [ "$BATCH" = "morning" ]; then
            python3 scripts/collect-daily-news.py --exclude "juya AI 日报"
          elif [ "$BATCH" = "noon" ]; then
            python3 scripts/collect-daily-news.py --only "juya AI 日报"
          else
            python3 scripts/collect-daily-news.py
          fi

      - name: 采集 GitHub 趋势
        run: |
          echo "=== 采集 GitHub 趋势 ==="
          python3 scripts/collect-github-trending.py

      - name: 检查是否有变更
        id: changes
        run: |
          if git diff --quiet data/daily-news-raw.json data/github-trending.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "无变更，跳过提交"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: 提交变更
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/daily-news-raw.json data/github-trending.json
          BATCH="${{ steps.batch.outputs.batch }}"
          DATE=$(date -u +%Y-%m-%d)
          git commit -m "chore(daily-news): 采集候选池 ${BATCH} - ${DATE}"
          git push

      - name: 发送飞书通知
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          BATCH="${{ steps.batch.outputs.batch }}"
          python3 scripts/notify-feishu.py --batch "$BATCH"
