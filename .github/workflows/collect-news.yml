# CampBrief 手动资讯采集兜底
#
# 日常的采集、编辑、校验和发布全部由手机 Hermes cron 完成。
# 此 workflow 刻意不设 schedule，仅保留人工手动触发，供维护者排查采集器时使用。
# 它不能作为生产发布链路或 Hermes 的前置依赖。

name: 手动采集资讯候选（维护兜底）

on:
  # 仅支持人工触发，用于采集器排查；日常生产链路只跑在手机 Hermes。
  workflow_dispatch:
    inputs:
      batch:
        description: "采集批次（morning=排除juya / noon=只采juya / full=全量）"
        type: choice
        options: [morning, noon, full]
        default: full

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 读取手动选择的批次
        id: batch
        run: |
          echo "batch=${{ github.event.inputs.batch }}" >> $GITHUB_OUTPUT

      - name: 采集每日资讯候选池
        run: |
          BATCH="${{ steps.batch.outputs.batch }}"
          echo "=== 采集批次: $BATCH ==="

          if [ "$BATCH" = "morning" ]; then
            python3 scripts/collect-daily-news.py --exclude "juya AI 日报"
          elif [ "$BATCH" = "noon" ]; then
            python3 scripts/collect-daily-news.py --only "juya AI 日报"
          else
            python3 scripts/collect-daily-news.py
          fi

      - name: 采集 GitHub 趋势
        run: |
          echo "=== 采集 GitHub 趋势 ==="
          python3 scripts/collect-github-trending.py

      - name: 检查是否有变更
        id: changes
        run: |
          if git diff --quiet data/daily-news-raw.json data/github-trending.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "无变更，跳过提交"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: 提交变更
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/daily-news-raw.json data/github-trending.json
          BATCH="${{ steps.batch.outputs.batch }}"
          DATE=$(date -u +%Y-%m-%d)
          git commit -m "chore(daily-news): 采集候选池 ${BATCH} - ${DATE}"
          git push
